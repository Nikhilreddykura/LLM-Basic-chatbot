<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Chatbot UI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #2563eb;
      color: white;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .chat-box {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease-in;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #e5e7eb;
      color: #111827;
    }

    .loading {
      align-self: flex-start;
      background: #e5e7eb;
      padding: 10px 14px;
      border-radius: 12px;
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      gap: 10px;
      background: white;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .chat-input button {
      padding: 12px 18px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-input button:hover {
      background: #1d4ed8;
    }

    .hint {
      padding: 0 16px 14px;
      font-size: 12px;
      color: #6b7280;
      background: white;
    }

  </style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">AI Chatbot</div>

  <div id="chatBox" class="chat-box">
    <div class="message bot">Hello! Ask me anything.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="hint">Backend endpoint: http://127.0.0.1:8000/chat</div>

</div>

<script>

const chatBox = document.getElementById('chatBox');
const messageInput = document.getElementById('messageInput');

function addMessage(text, sender) {

  const msg = document.createElement('div');
  msg.className = `message ${sender}`;
  msg.textContent = text;

  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addLoading() {

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.id = 'loadingIndicator';

  loading.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  chatBox.appendChild(loading);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeLoading() {

  const loading = document.getElementById('loadingIndicator');

  if (loading) {
    loading.remove();
  }
}

async function sendMessage() {

  const message = messageInput.value.trim();

  if (!message) return;

  addMessage(message, 'user');
  messageInput.value = '';

  addLoading();

  try {

    const response = await fetch('http://127.0.0.1:8000/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    removeLoading();

    addMessage(data.bot_response || 'No response from bot.', 'bot');

  } catch (error) {

    removeLoading();

    addMessage('Could not connect to chatbot API.', 'bot');
  }
}

messageInput.addEventListener('keypress', function(event) {

  if (event.key === 'Enter') {
    sendMessage();
  }

});

</script>

</body>
</html>
